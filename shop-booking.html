<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoolCare | Booking Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F7F5F0;
      --bg2:#FFFFFF;
      --bg3:#F1EFE9;
      --border:rgba(197,160,89,0.15);
      --border2:rgba(197,160,89,0.35);
      --blue:#C5A059;
      --blue2:#D4AF37;
      --glow:rgba(197,160,89,0.12);
      --green:#6E8B68;
      --green-bg:#EBF0EA;
      --paper:#F7F5F0;
      --line:#E2E0D9;
      --ink:#0D0D0E;
      --muted:#7E7A72;
      --muted2:#B5B1A8;
      --red:#B85A5A;
      --red-bg:#FBEAEA;
    }
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--paper),#F1EFE9);color:var(--ink);font:15px/1.6 'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,sans-serif}
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent);z-index:100}
    h1,h2,h3,.brand{font-family:'Playfair Display',Georgia,serif;font-weight:700}
    a{color:var(--blue);text-decoration:none;transition:color 0.3s cubic-bezier(0.16, 1, 0.3, 1)}
    a:hover{color:var(--blue2)}
    .nav{height:72px;display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:auto;padding:0 26px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
    .brand{font-weight:700;letter-spacing:1.5px;font-size:24px;color:var(--ink);text-transform:uppercase}.brand b{color:var(--blue);font-weight:900}
    .nav-right{display:flex;align-items:center;gap:16px}
    .back{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
    .back:hover{color:var(--blue)}
    .wrap{max-width:900px;margin:auto;padding:28px 24px 60px}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:14px}
    .page-header h1{font-size:28px;letter-spacing:-0.2px;margin:0 0 4px}
    .badge{display:inline-block;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
    .badge.open{background:rgba(197,160,89,0.08);color:var(--blue);border:1px solid rgba(197,160,89,0.15)}
    .badge.accepted,.badge.assigned{background:rgba(197,160,89,0.04);color:var(--blue2);border:1px solid rgba(197,160,89,0.12)}
    .badge.completed{background:var(--green-bg);color:var(--green);border:1px solid rgba(110,139,104,0.15)}
    .badge.cancelled,.badge.rejected{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
    .badge.on_the_way{background:rgba(197,160,89,0.04);color:var(--blue2);border:1px solid rgba(197,160,89,0.12)}
    .badge.arrived{background:var(--red-bg);color:var(--red);border:1px solid rgba(184,90,90,0.15)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px 26px;box-shadow:0 16px 48px rgba(197,160,89,0.05);position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue2),transparent);opacity:0.5}
    .card h2{font-size:16px;font-weight:800;margin:0 0 18px;letter-spacing:-0.2px}
    .info-row{display:flex;flex-direction:column;margin-bottom:12px}
    .info-row:last-child{margin:0}
    .info-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .info-value{font-size:14px;font-weight:600}
    .section-label{font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
    .actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
    .action-btn{padding:12px 16px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);font:700 13px inherit;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1)}
    .action-btn:hover{border-color:var(--blue);background:rgba(197,160,89,0.06);color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 12px rgba(197,160,89,0.08)}
    .action-btn.danger:hover{border-color:var(--red);background:var(--red-bg);color:var(--red)}
    .action-btn.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#090A0F;border-color:var(--blue);box-shadow:0 4px 16px var(--glow)}
    .action-btn.primary:hover{background:linear-gradient(135deg,var(--blue2),#E8C96A);transform:translateY(-2px);box-shadow:0 8px 24px rgba(197,160,89,0.3)}
    .action-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
    .field{margin-bottom:14px}
    label{display:block;font-weight:700;font-size:12px;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font:inherit;background:var(--bg2);transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1)}
    input:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px var(--glow)}
    textarea{resize:vertical;min-height:80px}
    .save-btn{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#090A0F;border:0;border-radius:10px;padding:12px 20px;font:700 14px inherit;cursor:pointer;box-shadow:0 4px 16px var(--glow);transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1);letter-spacing:0.3px}
    .save-btn:hover{background:linear-gradient(135deg,var(--blue2),#E8C96A);transform:translateY(-2px);box-shadow:0 8px 24px rgba(197,160,89,0.3)}.save-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1A1B22,#0D0D0E);color:var(--paper);padding:14px 26px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:1px solid rgba(197,160,89,0.2)}
    .toast.show{opacity:1}
    @media(max-width:680px){.grid{grid-template-columns:1fr}.page-header{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<nav class="nav">
  <a class="brand" href="/shop-dashboard.html">cool<b>care</b></a>
  <div class="nav-right">
    <a class="back" href="/shop-dashboard.html">← Dashboard</a>
  </div>
</nav>

<div class="wrap">
  <div id="loadingMsg" style="text-align:center;color:var(--muted);padding:60px">Loading booking…</div>
  <div id="bookingContent" style="display:none">

    <div class="page-header">
      <div>
        <h1 id="pageTitle">Booking #</h1>
        <div id="statusBadge" class="badge">—</div>
        <span id="createdAt" style="font-size:12px;color:var(--muted);margin-left:10px"></span>
      </div>
    </div>

    <!-- Customer & booking info -->
    <div class="grid" id="infoGrid">
      <div class="card">
        <h2>Customer Details</h2>
        <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="custName">—</span></div>
        <div class="info-row"><span class="info-label">Phone</span><span class="info-value" id="custPhone">—</span></div>
        <div class="info-row"><span class="info-label">Address</span><span class="info-value" id="custAddress">—</span></div>
        <div class="info-row"><span class="info-label">Area</span><span class="info-value" id="custArea">—</span></div>
      </div>
      <div class="card">
        <h2>Booking Details</h2>
        <div class="info-row"><span class="info-label">Appliance / Service</span><span class="info-value" id="serviceType">—</span></div>
        <div class="info-row"><span class="info-label">Preferred Date</span><span class="info-value" id="urgency">—</span></div>
        <div class="info-row"><span class="info-label">Assigned Technician</span><span class="info-value" id="techName">—</span></div>
        <div class="info-row"><span class="info-label">Estimated Cost</span><span class="info-value" id="estCost">—</span></div>
        <div class="info-row"><span class="info-label">Final Cost</span><span class="info-value" id="finalCost">—</span></div>
      </div>
    </div>

    <!-- Technician notes -->
    <div class="card" style="margin-top:16px;display:none" id="notesCard">
      <h2>Technician Notes</h2>
      <p id="techNotes" style="margin:0;font-size:14px;color:var(--ink)"></p>
    </div>

    <!-- Timeline -->
    <div class="card" style="margin-top:16px">
      <h2>Booking Timeline</h2>
      <div id="timelineContainer"></div>
    </div>

    <!-- Job actions -->
    <div class="section-label" style="margin-top:26px">Job Actions</div>
    <div class="actions" id="actionsContainer">
      <!-- Populated dynamically -->
    </div>

    <!-- Technician assignment form -->
    <div class="card" style="margin-top:0" id="techForm">
      <h2>Update Technician & Costs</h2>
      <div class="grid" style="gap:12px">
        <div class="field">
          <label for="technicianName">Technician Name</label>
          <input id="technicianName" type="text" placeholder="Full name">
        </div>
        <div class="field">
          <label for="estCostInput">Estimated Cost (₹)</label>
          <input id="estCostInput" type="number" placeholder="e.g. 500" min="0">
        </div>
        <div class="field">
          <label for="finalCostInput">Final Cost (₹)</label>
          <input id="finalCostInput" type="number" placeholder="e.g. 650" min="0">
        </div>
      </div>
      <div class="field">
        <label for="notesInput">Technician Notes</label>
        <textarea id="notesInput" placeholder="Observations, parts needed, work done…"></textarea>
      </div>
      <button class="save-btn" id="saveTechBtn" onclick="saveTechDetails()">Save Details</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const token = localStorage.getItem('cc_token');
  if (!token) window.location.href = '/login.html';

  const params    = new URLSearchParams(location.search);
  const bookingId = params.get('id');
  if (!bookingId) window.location.href = '/shop-dashboard.html';

  let booking = null;

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function loadBooking() {
    try {
      const res = await fetch(`/api/shop?action=booking&id=${bookingId}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { window.location.href = '/login.html'; return; }
      if (res.status === 404) {
        document.getElementById('loadingMsg').textContent = 'Booking not found.';
        return;
      }
      const data = await res.json();
      booking = data.booking;
      window.timelineData = data.timeline || [];
      window.techniciansData = data.technicians || [];
      renderBooking();
    } catch (err) {
      console.error('[booking] Load error:', err);
      document.getElementById('loadingMsg').textContent = 'Failed to load booking.';
    }
  }

  function renderBooking() {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('bookingContent').style.display = 'block';

    document.getElementById('pageTitle').textContent    = `Booking #${booking.id}`;
    document.getElementById('statusBadge').textContent  = booking.status.replace(/_/g, ' ');
    document.getElementById('statusBadge').className    = `badge ${booking.status}`;
    document.getElementById('createdAt').textContent    = new Date(booking.created_at).toLocaleString();
    document.getElementById('custName').textContent     = booking.customer_name || '—';
    document.getElementById('custPhone').textContent    = booking.customer_number || '—';
    document.getElementById('custAddress').textContent  = booking.address || '—';
    document.getElementById('custArea').textContent     = booking.area || '—';
    document.getElementById('serviceType').textContent  = booking.service_type || '—';
    document.getElementById('urgency').textContent      = booking.urgency || '—';
    document.getElementById('techName').textContent     = booking.technician_name || booking.assigned_technician_name || '—';
    document.getElementById('estCost').textContent      = booking.estimated_cost ? `₹${booking.estimated_cost}` : '—';
    document.getElementById('finalCost').textContent    = booking.final_cost ? `₹${booking.final_cost}` : '—';

    if (booking.technician_notes) {
      document.getElementById('notesCard').style.display = 'block';
      document.getElementById('techNotes').textContent   = booking.technician_notes;
    }

    // Pre-fill the update form
    document.getElementById('technicianName').value = booking.technician_name || '';
    document.getElementById('estCostInput').value   = booking.estimated_cost || '';
    document.getElementById('finalCostInput').value = booking.final_cost || '';
    document.getElementById('notesInput').value     = booking.technician_notes || '';

    renderActions();
    renderTimeline();
  }

  function renderTimeline() {
    const timeline = window.timelineData || [];
    const container = document.getElementById('timelineContainer');
    if (!container) return;

    if (!timeline.length) {
      container.innerHTML = '<p style="color:var(--muted);font-size:13px;margin:0;">No timeline entries yet.</p>';
      return;
    }

    container.innerHTML = timeline.map(entry => `
      <div style="padding:12px 0;border-bottom:1px solid var(--line);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <strong style="font-size:13px;color:var(--ink);">${escapeHtml(entry.action_type.replace(/_/g, ' '))}</strong>
          <span style="font-size:11px;color:var(--muted);">${new Date(entry.created_at).toLocaleString()}</span>
        </div>
        ${entry.notes ? `<p style="margin:4px 0 0;font-size:13px;color:var(--ink);">${escapeHtml(entry.notes)}</p>` : ''}
        ${entry.changed_by ? `<small style="color:var(--muted);font-size:11px;">By: ${escapeHtml(entry.changed_by)}</small>` : ''}
      </div>
    `).join('');
  }

  const SVGS = {
    check: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
    x: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
    user: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
    truck: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>`,
    mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`
  };

  const ACTION_FLOWS = {
    open:       [{ label: 'Accept Booking',       status: 'accepted',   cls: 'primary', icon: SVGS.check },
                 { label: 'Reject Booking',        status: 'rejected',   cls: 'danger',  icon: SVGS.x }],
    accepted:   [{ label: 'Assign Technician',    status: 'assigned',   cls: '',         icon: SVGS.user },
                 { label: 'Cancel Booking',        status: 'cancelled',  cls: 'danger',  icon: SVGS.x }],
    assigned:   [{ label: 'Technician On The Way', status: 'on_the_way', cls: '',         icon: SVGS.truck },
                 { label: 'Cancel Booking',        status: 'cancelled',  cls: 'danger',  icon: SVGS.x }],
    on_the_way: [{ label: 'Mark Arrived',          status: 'arrived',    cls: '',         icon: SVGS.mapPin }],
    arrived:    [{ label: 'Mark Completed',         status: 'completed',  cls: 'primary', icon: SVGS.check },
                 { label: 'Cancel Booking',         status: 'cancelled',  cls: 'danger',  icon: SVGS.x }],
    completed:  [],
    cancelled:  [],
    rejected:   [],
  };

  function renderActions() {
    const container = document.getElementById('actionsContainer');
    const actions = ACTION_FLOWS[booking.status] || [];
    if (!actions.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;">No further actions available for this status.</div>';
      return;
    }
    container.innerHTML = actions.map(a =>
      `<button class="action-btn ${a.cls}" onclick="updateStatus('${a.status}')">${a.icon || ''}<span>${escapeHtml(a.label)}</span></button>`
    ).join('');
  }

  async function updateStatus(status) {
    const buttons = document.querySelectorAll('.action-btn');
    buttons.forEach(b => b.disabled = true);

    // When assigning, include technician name from the form if filled
    const technicianName = status === 'assigned'
      ? document.getElementById('technicianName').value.trim() || undefined
      : undefined;

    try {
      const res = await fetch('/api/shop', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ action: 'update', bookingId: booking.id, status, technicianName }),
      });
      if (res.status === 401) { window.location.href = '/login.html'; return; }
      const data = await res.json();
      if (!res.ok) {
        showToast('Error: ' + (data.error || 'Update failed'));
        return;
      }
      booking = data.booking;
      showToast(`Status updated to "${status.replace(/_/g,' ')}" ✓`);
      renderBooking();
    } catch (err) {
      console.error('[booking] Update error:', err);
      showToast('Network error. Please try again.');
    } finally {
      buttons.forEach(b => b.disabled = false);
    }
  }

  async function saveTechDetails() {
    const btn = document.getElementById('saveTechBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const body = {
      bookingId:      booking.id,
      technicianName: document.getElementById('technicianName').value.trim() || undefined,
      estimatedCost:  document.getElementById('estCostInput').value  || undefined,
      finalCost:      document.getElementById('finalCostInput').value || undefined,
      technicianNotes: document.getElementById('notesInput').value.trim() || undefined,
    };
    // Remove undefined keys
    Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);

    try {
      const res = await fetch('/api/shop', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ action: 'update', ...body }),
      });
      const data = await res.json();
      if (!res.ok) { showToast('Error: ' + (data.error || 'Save failed')); return; }
      booking = data.booking;
      showToast('Details saved ✓');
      renderBooking();
    } catch (err) {
      showToast('Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Details';
    }
  }

  loadBooking();
</script>
</body>
</html>
