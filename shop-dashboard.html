<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoolCare | Shop Dashboard</title>
  <style>
    :root{--navy:#09233b;--blue:#146ef5;--sky:#eaf3ff;--mint:#dbf7ea;--green:#08784d;--gold:#ffbd53;--paper:#f7f9fc;--line:#e3eaf1;--ink:#102a43;--muted:#64778b;--red:#d93025}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.6 Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}
    a{color:inherit;text-decoration:none}
    .nav{height:72px;display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:auto;padding:0 26px;border-bottom:1px solid var(--line);background:#fff}
    .brand{font-weight:850;letter-spacing:-1.2px;font-size:22px}.brand b{color:var(--blue)}
    .nav-right{display:flex;align-items:center;gap:18px}
    .shop-name{font-weight:700;font-size:14px;color:var(--ink)}
    .logout-btn{font-size:13px;font-weight:700;color:var(--muted);padding:8px 13px;border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:background .15s}
    .logout-btn:hover{background:var(--paper)}
    .wrap{max-width:1280px;margin:auto;padding:26px}
    .header{margin-bottom:24px}.header h1{font-size:28px;letter-spacing:-1.2px;margin:0 0 6px}.header p{color:var(--muted);margin:0}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
    .stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px}
    .stat-card .label{font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .stat-card .value{font-size:32px;font-weight:850;letter-spacing:-1.4px}
    .stat-card.open .value{color:var(--blue)}
    .stat-card.accepted .value,.stat-card.assigned .value{color:var(--gold)}
    .stat-card.completed .value{color:var(--green)}
    .stat-card.cancelled .value,.stat-card.rejected .value{color:var(--muted)}
    .section-header{font-weight:800;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:9px}
    .section-header .badge{background:var(--line);color:var(--ink);border-radius:20px;padding:4px 9px;font-size:12px;font-weight:800}
    .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:16px}
    .tab{padding:10px 16px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
    .tab:hover{color:var(--ink)}.tab.active{color:var(--blue);border-color:var(--blue)}
    .bookings-grid{display:grid;gap:10px}
    .booking-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;transition:box-shadow .15s}
    .booking-card:hover{box-shadow:0 4px 18px #102a4310}
    .booking-info .id{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:4px}
    .booking-info .name{font-weight:750;font-size:15px;margin-bottom:2px}
    .booking-info .detail{font-size:13px;color:var(--muted)}
    .booking-badge{display:inline-block;padding:6px 11px;border-radius:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
    .booking-badge.open{background:#e9f3ff;color:#1761bd}
    .booking-badge.accepted,.booking-badge.assigned{background:#fff7e0;color:#7a5c00}
    .booking-badge.completed{background:var(--mint);color:var(--green)}
    .booking-badge.cancelled,.booking-badge.rejected{background:#f0f0f0;color:#888}
    .booking-badge.on_the_way{background:#d6ebff;color:#1e63c5}
    .booking-badge.arrived{background:#ffeaea;color:#c00}
    .empty{text-align:center;color:var(--muted);padding:40px 20px}
    @media(max-width:660px){.stats{grid-template-columns:repeat(2,1fr)}.nav-right{gap:10px}.shop-name{display:none}}
  </style>
</head>
<body>
<nav class="nav">
  <a class="brand" href="/shop-dashboard.html">cool<b>care</b></a>
  <div class="nav-right">
    <span class="shop-name" id="shopName">Loading…</span>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="wrap">
  <div class="header">
    <h1>Dashboard</h1>
    <p>Manage your CoolCare service bookings</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card open"><div class="label">Open</div><div class="value" id="count-open">—</div></div>
    <div class="stat-card accepted"><div class="label">Accepted</div><div class="value" id="count-accepted">—</div></div>
    <div class="stat-card assigned"><div class="label">Assigned</div><div class="value" id="count-assigned">—</div></div>
    <div class="stat-card completed"><div class="label">Completed</div><div class="value" id="count-completed">—</div></div>
  </div>

  <div class="section-header">Bookings <span class="badge" id="totalBadge">0</span></div>

  <div class="tabs">
    <div class="tab active" data-filter="all" onclick="filterBookings('all')">All</div>
    <div class="tab" data-filter="open" onclick="filterBookings('open')">Open</div>
    <div class="tab" data-filter="accepted" onclick="filterBookings('accepted')">Accepted</div>
    <div class="tab" data-filter="assigned" onclick="filterBookings('assigned')">Assigned</div>
    <div class="tab" data-filter="on_the_way" onclick="filterBookings('on_the_way')">On The Way</div>
    <div class="tab" data-filter="arrived" onclick="filterBookings('arrived')">Arrived</div>
    <div class="tab" data-filter="completed" onclick="filterBookings('completed')">Completed</div>
  </div>

  <div class="bookings-grid" id="bookingsList"></div>
</div>

<script>
  const token = localStorage.getItem('cc_token');
  if (!token) { window.location.href = '/shop-login.html'; }

  let allBookings = [];
  let currentFilter = 'all';

  const shopData = JSON.parse(localStorage.getItem('cc_shop') || '{}');
  if (shopData.shopName) document.getElementById('shopName').textContent = shopData.shopName;

  function logout() {
    fetch('/api/auth/logout', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
    }).catch(() => {});
    localStorage.removeItem('cc_token');
    localStorage.removeItem('cc_shop');
    window.location.href = '/shop-login.html';
  }

  async function loadDashboard() {
    try {
      const res = await fetch('/api/shop/dashboard', {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      // Update stats
      if (data.counts) {
        document.getElementById('count-open').textContent      = data.counts.open || 0;
        document.getElementById('count-accepted').textContent  = data.counts.accepted || 0;
        document.getElementById('count-assigned').textContent  = data.counts.assigned || 0;
        document.getElementById('count-completed').textContent = data.counts.completed || 0;
      }

      allBookings = data.bookings || [];
      document.getElementById('totalBadge').textContent = allBookings.length;
      renderBookings();
    } catch (err) {
      console.error('[dashboard] Load error:', err);
      document.getElementById('bookingsList').innerHTML = '<div class="empty">Failed to load dashboard. Please refresh.</div>';
    }
  }

  function filterBookings(status) {
    currentFilter = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-filter="${status}"]`).classList.add('active');
    renderBookings();
  }

  function renderBookings() {
    const list = document.getElementById('bookingsList');
    const filtered = currentFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.status === currentFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">No ${currentFilter === 'all' ? '' : currentFilter} bookings yet.</div>`;
      return;
    }

    list.innerHTML = filtered.map(b => {
      const statusLabel = b.status.replace(/_/g, ' ');
      return `
        <div class="booking-card" onclick="openBooking(${b.id})">
          <div class="booking-info">
            <div class="id">#${b.id} • ${new Date(b.created_at).toLocaleDateString()}</div>
            <div class="name">${escapeHtml(b.customer_name || b.customer_number)}</div>
            <div class="detail">${escapeHtml(b.service_type)} • ${escapeHtml(b.area || 'Area pending')}</div>
          </div>
          <div class="booking-badge ${b.status}">${statusLabel}</div>
        </div>
      `;
    }).join('');
  }

  function openBooking(id) {
    window.location.href = `/shop-booking.html?id=${id}`;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  loadDashboard();
  setInterval(loadDashboard, 30000); // refresh every 30s
</script>
</body>
</html>
