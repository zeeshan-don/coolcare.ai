<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoolCare | Shop Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;
      --bg2:#111111;
      --bg3:#1a1a1a;
      --border:#1e1e1e;
      --border2:#333;
      --ink:#ededed;
      --ink2:#a3a3a3;
      --muted:#737373;
      --muted2:#525252;
      --green:#22c55e;
      --green-bg:#0a1a0a;
      --red:#ef4444;
      --red-bg:#1a0a0a;
    }
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 'Inter',system-ui,sans-serif}
    body::before{display:none}
    h1,h2,h3,.brand,.stat-card .value{font-family:'Inter',system-ui,sans-serif;font-weight:700}
    a{color:inherit;text-decoration:none}
    .nav{height:72px;display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:auto;padding:0 26px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
    .brand{font-weight:700;letter-spacing:0.5px;font-size:24px;text-transform:lowercase;color:#fff}.brand b{color:#fff;font-weight:900}
    .nav-right{display:flex;align-items:center;gap:18px}
    .shop-name{font-weight:600;font-size:13px;color:var(--muted)}
    .logout-btn{font-size:12px;font-weight:600;color:var(--muted);padding:9px 15px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;background:transparent;transition:all 0.2s}
    .logout-btn:hover{background:transparent;color:#fff;border-color:#555}
    .wrap{max-width:1280px;margin:auto;padding:26px}
    .header{margin-bottom:28px}.header h1{font-size:36px;letter-spacing:-1px;margin:0 0 8px;color:#fff}.header p{color:var(--muted);margin:0;font-size:15px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
    .stat-card::before{display:none}
    .stat-card .label{font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px}
    .stat-card .value{font-size:36px;font-weight:700;letter-spacing:-0.5px}
    .stat-card.open .value{color:#fff}
    .stat-card.accepted .value,.stat-card.assigned .value{color:var(--ink2)}
    .stat-card.completed .value{color:var(--green)}
    .stat-card.cancelled .value,.stat-card.rejected .value{color:var(--muted)}
    .section-header{font-weight:600;font-size:12px;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:9px;color:var(--muted)}
    .section-header .badge{background:var(--bg3);color:var(--ink);border:1px solid var(--border);border-radius:20px;padding:4px 9px;font-size:11px;font-weight:600}
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
    .tab{padding:10px 16px;font-weight:600;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
    .tab:hover{color:var(--ink)}.tab.active{color:#fff;border-color:#fff}
    .bookings-grid{display:grid;gap:10px}
    .booking-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;cursor:pointer;transition:all 0.2s}
    .booking-card:hover{border-color:var(--border2);transform:translateY(-2px)}
    .booking-info .id{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px}
    .booking-info .name{font-weight:700;font-size:16px;margin-bottom:2px;color:#fff}
    .booking-info .detail{font-size:13px;color:var(--muted)}
    .booking-badge{display:inline-block;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.3px}
    .booking-badge.open{background:rgba(255,255,255,0.05);color:var(--ink2);border:1px solid var(--border2)}
    .booking-badge.accepted,.booking-badge.assigned{background:rgba(255,255,255,0.05);color:var(--ink2);border:1px solid var(--border2)}
    .booking-badge.completed{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
    .booking-badge.cancelled,.booking-badge.rejected{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
    .booking-badge.on_the_way{background:rgba(255,255,255,0.05);color:var(--ink2);border:1px solid var(--border2)}
    .booking-badge.arrived{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
    .empty{text-align:center;color:var(--muted);padding:40px 20px}
    @media(max-width:660px){.stats{grid-template-columns:repeat(2,1fr)}.nav-right{gap:10px}.shop-name{display:none}}
  </style>
</head>
<body>
<nav class="nav">
  <a class="brand" href="/shop-dashboard.html">cool<b>care</b></a>
  <div class="nav-right">
    <span class="shop-name" id="shopName">Loading…</span>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="wrap">
  <div class="header">
    <h1>Dashboard</h1>
    <p>Manage your CoolCare service bookings</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card open"><div class="label">Open</div><div class="value" id="count-open">—</div></div>
    <div class="stat-card accepted"><div class="label">Accepted</div><div class="value" id="count-accepted">—</div></div>
    <div class="stat-card assigned"><div class="label">Assigned</div><div class="value" id="count-assigned">—</div></div>
    <div class="stat-card completed"><div class="label">Completed</div><div class="value" id="count-completed">—</div></div>
    <div class="stat-card" style="border-color:var(--border2)"><div class="label">Today's</div><div class="value" id="count-today" style="color:#fff">—</div></div>
    <div class="stat-card" style="border-color:var(--border2)"><div class="label">Revenue</div><div class="value" id="count-revenue" style="color:var(--green);font-size:24px">—</div></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
    <div class="section-header" style="margin:0">Bookings <span class="badge" id="totalBadge">0</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="searchInput" type="text" placeholder="Search name or phone…" onkeyup="if(event.key==='Enter')searchBookings()" style="border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font:inherit;font-size:13px;width:200px;background:var(--bg);color:var(--ink)">
      <button onclick="exportCSV()" style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font:500 12px inherit;cursor:pointer;color:var(--muted)">Export CSV</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-filter="all" onclick="filterBookings('all')">All</div>
    <div class="tab" data-filter="open" onclick="filterBookings('open')">Open</div>
    <div class="tab" data-filter="accepted" onclick="filterBookings('accepted')">Accepted</div>
    <div class="tab" data-filter="assigned" onclick="filterBookings('assigned')">Assigned</div>
    <div class="tab" data-filter="on_the_way" onclick="filterBookings('on_the_way')">On The Way</div>
    <div class="tab" data-filter="arrived" onclick="filterBookings('arrived')">Arrived</div>
    <div class="tab" data-filter="completed" onclick="filterBookings('completed')">Completed</div>
  </div>

  <div class="bookings-grid" id="bookingsList"></div>

  <div style="display:flex;gap:8px;justify-content:center;margin-top:20px">
    <button id="prevBtn" onclick="changePage(-1)" disabled style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font:500 12px inherit;cursor:pointer;color:var(--muted)">← Prev</button>
    <span id="pageInfo" style="color:var(--muted);padding:8px;font-size:13px">Page 1</span>
    <button id="nextBtn" onclick="changePage(1)" style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font:500 12px inherit;cursor:pointer;color:var(--muted)">Next →</button>
  </div>
</div>

<script>
  const token = localStorage.getItem('cc_token');
  if (!token) { window.location.href = '/login.html'; }

  let allBookings = [];
  let currentFilter = 'all';
  let currentPage = 1;
  let searchQuery = '';

  const shopData = JSON.parse(localStorage.getItem('cc_shop') || '{}');
  if (shopData.shopName) document.getElementById('shopName').textContent = shopData.shopName;

  function logout() {
    fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ action: 'logout' }),
    }).catch(() => {});
    localStorage.removeItem('cc_token');
    localStorage.removeItem('cc_shop');
    localStorage.removeItem('cc_user');
    window.location.href = '/login.html';
  }

  function searchBookings() {
    searchQuery = document.getElementById('searchInput').value.trim();
    currentPage = 1;
    loadDashboard();
  }

  function changePage(delta) {
    currentPage += delta;
    loadDashboard();
  }

  function exportCSV() {
    const params = new URLSearchParams();
    if (currentFilter !== 'all') params.set('status', currentFilter);
    window.open(`/api/shop?action=export&${params}`, '_blank');
  }

  async function loadDashboard() {
    try {
      const params = new URLSearchParams({ page: currentPage, limit: 20 });
      if (currentFilter !== 'all') params.set('status', currentFilter);
      if (searchQuery) params.set('search', searchQuery);

      const res = await fetch(`/api/shop?${params}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      // Update stats
      if (data.counts) {
        document.getElementById('count-open').textContent      = data.counts.open || 0;
        document.getElementById('count-accepted').textContent  = data.counts.accepted || 0;
        document.getElementById('count-assigned').textContent  = data.counts.assigned || 0;
        document.getElementById('count-completed').textContent = data.counts.completed || 0;
      }
      if (data.stats) {
        document.getElementById('count-today').textContent = data.stats.todayBookings || 0;
        document.getElementById('count-revenue').textContent = (data.stats.totalRevenue || 0).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
      }

      allBookings = data.bookings || [];
      const total = data.pagination?.total || allBookings.length;
      document.getElementById('totalBadge').textContent = total;
      document.getElementById('pageInfo').textContent = `Page ${data.pagination?.page || 1} of ${data.pagination?.totalPages || 1}`;
      document.getElementById('prevBtn').disabled = (data.pagination?.page || 1) <= 1;
      document.getElementById('nextBtn').disabled = (data.pagination?.page || 1) >= (data.pagination?.totalPages || 1);
      renderBookings();
    } catch (err) {
      console.error('[dashboard] Load error:', err);
      document.getElementById('bookingsList').innerHTML = '<div class="empty">Failed to load dashboard. Please refresh.</div>';
    }
  }

  function filterBookings(status) {
    currentFilter = status;
    currentPage = 1;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-filter="${status}"]`).classList.add('active');
    loadDashboard();
  }

  function renderBookings() {
    const list = document.getElementById('bookingsList');
    const filtered = currentFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.status === currentFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">No ${currentFilter === 'all' ? '' : currentFilter} bookings yet.</div>`;
      return;
    }

    list.innerHTML = filtered.map(b => {
      const statusLabel = b.status.replace(/_/g, ' ');
      return `
        <div class="booking-card" onclick="openBooking(${b.id})">
          <div class="booking-info">
            <div class="id">#${b.id} • ${new Date(b.created_at).toLocaleDateString()}</div>
            <div class="name">${escapeHtml(b.customer_name || b.customer_number)}</div>
            <div class="detail">${escapeHtml(b.service_type)} • ${escapeHtml(b.area || 'Area pending')}</div>
          </div>
          <div class="booking-badge ${b.status}">${statusLabel}</div>
        </div>
      `;
    }).join('');
  }

  function openBooking(id) {
    window.location.href = `/shop-booking.html?id=${id}`;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  loadDashboard();
  setInterval(loadDashboard, 30000); // refresh every 30s
</script>
</body>
</html>
