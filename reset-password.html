<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoolCare | Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--bg2:#111111;--border:#222;--border2:#333;--ink:#ededed;--ink2:#a3a3a3;--muted:#737373;--muted2:#525252;--red:#ef4444;--red-bg:#1a0a0a;--green:#22c55e;--green-bg:#0a1a0a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font:15px/1.6 'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:min(420px,100%)}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
    .logo p{color:var(--muted);font-size:14px;margin-top:6px}
    .field{margin-bottom:18px}
    label{display:block;font-weight:500;font-size:13px;margin-bottom:6px;color:var(--ink2)}
    input{width:100%;border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font:inherit;font-size:15px;background:var(--bg);color:var(--ink);transition:border-color 0.2s}
    input:focus{outline:none;border-color:#555;box-shadow:0 0 0 1px #555}
    input::placeholder{color:var(--muted2)}
    input.error{border-color:var(--red)}
    .err-msg{color:var(--red);font-size:12px;margin-top:4px;display:none}
    .err-msg.show{display:block}
    .btn{width:100%;background:#fff;color:#000;border:0;border-radius:10px;padding:12px;font:600 15px inherit;cursor:pointer;transition:all 0.2s}
    .btn:hover{background:#e5e5e5}.btn:disabled{opacity:.4;cursor:not-allowed}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;border:1px solid var(--border)}
    .alert.show{display:block}
    .alert.error{background:var(--red-bg);color:var(--red);border-color:#3a1515}
    .alert.success{background:var(--green-bg);color:var(--green);border-color:#153a15}
    .link{text-align:center;font-size:13px;color:var(--muted);margin-top:14px}
    .link a{color:var(--ink2);font-weight:500;text-decoration:none;transition:color 0.15s}
    .link a:hover{color:#fff}
    .invalid{text-align:center;padding:20px 0}
    .invalid p{color:var(--muted);font-size:14px;line-height:1.6}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>coolcare</h1>
    <p>Set your new password</p>
  </div>

  <div id="alert" class="alert"></div>

  <div id="invalidView" class="invalid" style="display:none">
    <p>This reset link is invalid or has expired.</p>
    <div class="link" style="margin-top:16px"><a href="/forgot-password.html">Request a new reset link</a></div>
  </div>

  <div id="formView">
    <form id="resetForm" novalidate>
      <div class="field">
        <label for="password">New password</label>
        <input id="password" type="password" placeholder="Min 8 chars, uppercase, lowercase, number" autocomplete="new-password">
        <div class="err-msg" id="password-err"></div>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat password" autocomplete="new-password">
        <div class="err-msg" id="confirmPassword-err"></div>
      </div>
      <button type="submit" class="btn" id="submitBtn">Reset password</button>
    </form>
  </div>

  <div id="successView" style="display:none;text-align:center;padding:20px 0">
    <p style="color:var(--green);font-size:15px;font-weight:600;margin-bottom:8px">Password reset successful!</p>
    <p style="color:var(--muted);font-size:14px">You can now log in with your new password.</p>
    <div class="link" style="margin-top:16px"><a href="/login.html">Go to login</a></div>
  </div>

  <div class="link"><a href="/login.html">Back to login</a></div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('invalidView').style.display = 'block';
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg; el.className = `alert show ${type}`;
  }
  function fieldError(id, msg) {
    const el = document.getElementById(id + '-err');
    const inp = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.toggle('show', !!msg); }
    if (inp) inp.classList.toggle('error', !!msg);
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.querySelectorAll('.err-msg').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    let valid = true;
    if (!password) { fieldError('password', 'Password is required'); valid = false; }
    else if (password.length < 8) { fieldError('password', 'Must be at least 8 characters'); valid = false; }
    if (!confirmPassword) { fieldError('confirmPassword', 'Please confirm your password'); valid = false; }
    else if (password !== confirmPassword) { fieldError('confirmPassword', 'Passwords do not match'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Resetting...';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'reset-password', token, password, confirmPassword }),
      });
      const data = await res.json();

      if (!res.ok) {
        if (data.error && (data.error.includes('expired') || data.error.includes('Invalid') || data.error.includes('used'))) {
          document.getElementById('formView').style.display = 'none';
          document.getElementById('invalidView').style.display = 'block';
          return;
        }
        showAlert(data.error || 'Failed to reset password.', 'error');
        return;
      }

      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } catch (err) {
      showAlert('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Reset password';
    }
  });
</script>
</body>
</html>
