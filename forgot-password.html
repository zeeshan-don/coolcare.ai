<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoolCare | Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--bg2:#111111;--border:#222;--border2:#333;--ink:#ededed;--ink2:#a3a3a3;--muted:#737373;--muted2:#525252;--red:#ef4444;--green:#22c55e;--green-bg:#0a1a0a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font:15px/1.6 'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:min(420px,100%)}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
    .logo p{color:var(--muted);font-size:14px;margin-top:6px}
    .field{margin-bottom:18px}
    label{display:block;font-weight:500;font-size:13px;margin-bottom:6px;color:var(--ink2)}
    input{width:100%;border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font:inherit;font-size:15px;background:var(--bg);color:var(--ink);transition:border-color 0.2s}
    input:focus{outline:none;border-color:#555;box-shadow:0 0 0 1px #555}
    input::placeholder{color:var(--muted2)}
    .btn{width:100%;background:#fff;color:#000;border:0;border-radius:10px;padding:12px;font:600 15px inherit;cursor:pointer;transition:all 0.2s}
    .btn:hover{background:#e5e5e5}.btn:disabled{opacity:.4;cursor:not-allowed}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;border:1px solid var(--border)}
    .alert.show{display:block}
    .alert.success{background:var(--green-bg);color:var(--green);border-color:#153a15}
    .link{text-align:center;font-size:13px;color:var(--muted);margin-top:14px}
    .link a{color:var(--ink2);font-weight:500;text-decoration:none;transition:color 0.15s}
    .link a:hover{color:#fff}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>coolcare</h1>
    <p>Reset your password</p>
  </div>

  <div id="alert" class="alert"></div>
  <div id="formView">
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.5">Enter the email associated with your account and we'll send you a link to reset your password.</p>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button type="submit" class="btn" id="submitBtn">Send reset link</button>
    </form>
  </div>
  <div id="successView" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:48px;margin-bottom:16px">✉</div>
    <p style="color:var(--ink);font-size:15px;font-weight:600;margin-bottom:8px">Check your email</p>
    <p style="color:var(--muted);font-size:14px;line-height:1.5">If an account with that email exists, we've sent a password reset link. The link expires in 30 minutes.</p>
  </div>
  <div class="link"><a href="/login.html">Back to login</a></div>
  <div class="link"><a href="/">Back to home</a></div>
</div>

<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg; el.className = `alert show ${type}`;
  }

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Please enter your email address.', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Sending...';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'forgot-password', email }),
      });
      await res.json();
      // Always show success (don't reveal if email exists)
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } catch (err) {
      showAlert('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send reset link';
    }
  });
</script>
</body>
</html>
